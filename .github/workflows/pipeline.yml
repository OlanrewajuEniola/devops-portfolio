name: Project 04 CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projects/project-04-cicd-pipeline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show working directory
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Project files:"
          ls -la
          echo ""
          echo "App files:"
          ls -la app

      - name: Validate required files
        run: |
          test -f Dockerfile
          test -f README.md
          test -f app/index.html
          echo "All required files are present."

      - name: Check Docker version
        run: docker --version

      - name: Build Docker image
        run: docker build -t project-04-cicd-pipeline:v1 .
